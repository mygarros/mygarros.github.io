<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>轉學招生公告 | 嶺東科技大學 學生發展處</title>
  <style>
    :root {
      --brand: #0b5394;
      --brand-dark: #073763;
      --accent: #f5a623;
      --bg: #f4f6f9;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #6b7785;
      --border: #e3e8ef;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", "Microsoft JhengHei", "PingFang TC", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }

    /* Header */
    header {
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
      color: #fff;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 2px 10px rgba(0,0,0,.15);
    }
    .header-inner {
      max-width: 1080px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .logo {
      width: 48px; height: 48px;
      background: var(--accent);
      border-radius: 12px;
      display: grid; place-items: center;
      font-weight: 800; font-size: 1.4rem; color: var(--brand-dark);
    }
    .title-group h1 { font-size: 1.4rem; font-weight: 700; }
    .title-group p { font-size: .85rem; opacity: .85; }
    .lang-btn {
      margin-left: auto;
      border: 1.5px solid rgba(255,255,255,.7);
      background: rgba(255,255,255,.12);
      color: #fff;
      font-size: .85rem; font-weight: 600;
      padding: .45rem .9rem;
      border-radius: 999px;
      cursor: pointer;
      transition: .15s;
    }
    .lang-btn:hover { background: #fff; color: var(--brand-dark); }

    /* Layout */
    main {
      max-width: 1080px;
      margin: 1.5rem auto;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 1.5rem;
    }
    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .panel-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 2px solid var(--brand);
    }
    .panel-head h2 { font-size: 1.15rem; color: var(--brand-dark); }

    /* Filter tabs */
    .tabs { display: flex; gap: .4rem; padding: .75rem 1.25rem; flex-wrap: wrap; }
    .tab {
      border: 1px solid var(--border);
      background: #fff;
      padding: .35rem .85rem;
      border-radius: 999px;
      font-size: .85rem;
      cursor: pointer;
      transition: .15s;
    }
    .tab:hover { border-color: var(--brand); color: var(--brand); }
    .tab.active { background: var(--brand); color: #fff; border-color: var(--brand); }

    /* Bulletin list */
    ul.bulletins { list-style: none; }
    .bulletin {
      display: flex; align-items: center; gap: 1rem;
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--border);
      transition: background .15s;
      cursor: pointer;
    }
    .bulletin:hover { background: #f0f6fc; }
    .badge {
      flex-shrink: 0;
      font-size: .72rem; font-weight: 700;
      padding: .25rem .6rem;
      border-radius: 6px;
      white-space: nowrap;
    }
    .badge.new { background: #ffe9e9; color: #d33; }
    .badge.info { background: #e7f1ff; color: var(--brand); }
    .badge.result { background: #e6f7ec; color: #1a8a4a; }
    .b-body { flex: 1; min-width: 0; }
    .b-body h3 {
      font-size: 1rem; font-weight: 600; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .b-meta { font-size: .8rem; color: var(--muted); margin-top: .15rem; }
    .b-meta span { margin-right: 1rem; }
    .pin { color: var(--accent); font-size: .9rem; }

    /* Sidebar */
    aside { display: flex; flex-direction: column; gap: 1.5rem; }
    .info-card { padding: 1.25rem; }
    .info-card h3 { color: var(--brand-dark); margin-bottom: .75rem; font-size: 1.05rem; }
    .info-row { display: flex; gap: .6rem; font-size: .9rem; margin-bottom: .6rem; }
    .info-row .ic { color: var(--brand); flex-shrink: 0; }
    .cta {
      display: block; text-align: center;
      background: var(--accent); color: var(--brand-dark);
      font-weight: 700; padding: .8rem;
      border-radius: 10px; margin-top: .5rem;
      transition: .15s;
    }
    .cta:hover { filter: brightness(1.05); transform: translateY(-1px); }

    footer {
      text-align: center; color: var(--muted);
      font-size: .82rem; padding: 2rem 1.5rem;
    }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      display: none; place-items: center; padding: 1rem; z-index: 50;
    }
    .modal-overlay.open { display: grid; }
    .modal {
      background: #fff; border-radius: 14px; max-width: 560px; width: 100%;
      padding: 1.5rem; max-height: 85vh; overflow-y: auto;
    }
    .modal h2 { color: var(--brand-dark); font-size: 1.2rem; margin-bottom: .5rem; }
    .modal .b-meta { margin-bottom: 1rem; }
    .modal p { margin-bottom: .75rem; }
    .modal-close {
      float: right; cursor: pointer; font-size: 1.5rem; color: var(--muted);
      line-height: 1; border: none; background: none;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">嶺</div>
      <div class="title-group">
        <h1 data-i18n="brandTitle">轉學招生公告</h1>
        <p data-i18n="brandSub">嶺東科技大學 ・ 學生發展處</p>
      </div>
      <button class="lang-btn" id="langBtn" onclick="toggleLang()">English</button>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="panel-head">
        <h2 data-i18n="latest">📌 最新公告</h2>
        <span class="b-meta" id="count"></span>
      </div>
      <div class="tabs" id="tabs">
        <button class="tab active" data-filter="all" data-i18n="fAll">全部</button>
        <button class="tab" data-filter="info" data-i18n="fInfo">招生簡章</button>
        <button class="tab" data-filter="result" data-i18n="fResult">成績查詢</button>
        <button class="tab" data-filter="new" data-i18n="fNew">最新</button>
      </div>
      <ul class="bulletins" id="list"></ul>
    </section>

    <aside>
      <div class="panel info-card">
        <h3 data-i18n="contact">📞 聯絡資訊</h3>
        <div class="info-row"><span class="ic">☎</span><div>(04) 3706-5678<br>(04) 2384-9482</div></div>
        <div class="info-row"><span class="ic">📍</span><div data-i18n="address">台中市 嶺東科技大學<br>IT 大樓 203 室</div></div>
        <div class="info-row"><span class="ic">🕘</span><div data-i18n="hours">週一至週五 08:00–17:00</div></div>
        <a class="cta" href="#" id="ctaBtn" data-i18n="cta">前往線上報名系統</a>
      </div>
      <div class="panel info-card">
        <h3 data-i18n="schedule">🗓 重要日程</h3>
        <div class="info-row"><span class="ic">▶</span><div data-i18n="sched1">115學年度第1學期報名<br><strong>5/11 – 7/17</strong></div></div>
        <div class="info-row"><span class="ic">▶</span><div data-i18n="sched2">114學年度第2學期成績<br><strong>已公告</strong></div></div>
      </div>
    </aside>
  </main>

  <footer data-i18n="footer">
    © 嶺東科技大學 學生發展處 ・ 本頁為示範用途，資料僅供參考。
  </footer>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <h2 id="m-title"></h2>
      <div class="b-meta" id="m-meta"></div>
      <div id="m-body"></div>
    </div>
  </div>

  <script>
    const bulletins = [
      {
        type: "info", pinned: true, isNew: true,
        title: "115學年度第1學期 日間部暨進修部轉學招生簡章及報名系統(5/11-7/17)",
        title_en: "AY115 Semester 1 — Day & Continuing Education Transfer Admission Prospectus & Registration System (5/11–7/17)",
        date: "2026-04-08", views: 617,
        body: "115學年度第1學期日間部暨進修部轉學招生現正報名中。報名期間為 5 月 11 日至 7 月 17 日，請考生詳閱招生簡章並透過線上報名系統完成報名手續。",
        body_en: "Transfer admission for AY115 Semester 1 (Day & Continuing Education divisions) is now open. The registration period runs from May 11 to July 17. Please read the prospectus carefully and complete your registration through the online system."
      },
      {
        type: "result", pinned: false, isNew: true,
        title: "114學年度第2學期 轉學考成績查詢",
        title_en: "AY114 Semester 2 — Transfer Exam Results Inquiry",
        date: "2026-01-20", views: 412,
        body: "114學年度第2學期轉學考成績現已開放查詢，請考生憑准考證號碼與身分證字號登入查詢系統檢視成績。對成績有疑義者，請於公告期限內提出複查申請。",
        body_en: "Results for the AY114 Semester 2 transfer exam are now open for inquiry. Candidates may log in with their admission ticket number and ID number to view their scores. To dispute a score, please submit a re-check request before the announced deadline."
      },
      {
        type: "info", pinned: false, isNew: false,
        title: "114學年度第2學期 轉學招生簡章及報名系統",
        title_en: "AY114 Semester 2 — Transfer Admission Prospectus & Registration System",
        date: "2025-11-14", views: 988,
        body: "114學年度第2學期轉學招生簡章已公布，包含招生名額、報考資格、考試科目及報名方式等資訊，請有意報考者詳閱。",
        body_en: "The AY114 Semester 2 transfer admission prospectus has been published, including quotas, eligibility requirements, exam subjects, and registration methods. Prospective applicants should read it carefully."
      },
      {
        type: "info", pinned: false, isNew: false,
        title: "114學年度第1學期 轉學招生簡章及報名系統",
        title_en: "AY114 Semester 1 — Transfer Admission Prospectus & Registration System",
        date: "2025-04-10", views: 1532,
        body: "114學年度第1學期轉學招生相關資訊，含日間部及進修部各系招生名額與報名流程說明。",
        body_en: "Information on AY114 Semester 1 transfer admission, including admission quotas for each department in the Day and Continuing Education divisions and the registration procedure."
      },
      {
        type: "result", pinned: false, isNew: false,
        title: "113學年度第2學期 轉學考錄取榜單公告",
        title_en: "AY113 Semester 2 — Transfer Exam Admission List Announcement",
        date: "2025-01-22", views: 845,
        body: "113學年度第2學期轉學考錄取榜單已公告，錄取生請依錄取通知辦理報到手續，逾期視同放棄。",
        body_en: "The admission list for the AY113 Semester 2 transfer exam has been announced. Admitted students should complete enrollment according to the admission notice; failure to do so by the deadline is treated as forfeiture."
      },
      {
        type: "info", pinned: false, isNew: false,
        title: "113學年度第1學期 轉學招生簡章及報名系統",
        title_en: "AY113 Semester 1 — Transfer Admission Prospectus & Registration System",
        date: "2024-04-15", views: 1290,
        body: "113學年度第1學期轉學招生簡章，提供各系招生名額、報考資格與考試日程等資訊。",
        body_en: "The AY113 Semester 1 transfer admission prospectus provides information such as admission quotas for each department, eligibility requirements, and the exam schedule."
      }
    ];

    const i18n = {
      zh: {
        brandTitle: "轉學招生公告", brandSub: "嶺東科技大學 ・ 學生發展處",
        latest: "📌 最新公告", fAll: "全部", fInfo: "招生簡章", fResult: "成績查詢", fNew: "最新",
        contact: "📞 聯絡資訊", address: "台中市 嶺東科技大學<br>IT 大樓 203 室",
        hours: "週一至週五 08:00–17:00", cta: "前往線上報名系統",
        schedule: "🗓 重要日程",
        sched1: "115學年度第1學期報名<br><strong>5/11 – 7/17</strong>",
        sched2: "114學年度第2學期成績<br><strong>已公告</strong>",
        footer: "© 嶺東科技大學 學生發展處 ・ 本頁為示範用途，資料僅供參考。",
        countFn: n => `共 ${n} 則`, badgeInfo: "簡章", badgeResult: "成績",
        views: "次瀏覽", langBtn: "English", ctaAlert: "連結至線上報名系統"
      },
      en: {
        brandTitle: "Transfer Admission Bulletin", brandSub: "Ling Tung University ・ Office of Student Development",
        latest: "📌 Latest Announcements", fAll: "All", fInfo: "Prospectus", fResult: "Results", fNew: "New",
        contact: "📞 Contact", address: "Ling Tung University, Taichung<br>IT Building, Room 203",
        hours: "Mon–Fri 08:00–17:00", cta: "Go to Online Registration",
        schedule: "🗓 Key Dates",
        sched1: "AY115 Sem 1 registration<br><strong>5/11 – 7/17</strong>",
        sched2: "AY114 Sem 2 results<br><strong>Published</strong>",
        footer: "© Ling Tung University, Office of Student Development ・ Demo page; information is for reference only.",
        countFn: n => `${n} item${n === 1 ? '' : 's'}`, badgeInfo: "Info", badgeResult: "Result",
        views: "views", langBtn: "中文", ctaAlert: "Link to the online registration system"
      }
    };
    let lang = "zh";

    const list = document.getElementById('list');
    const countEl = document.getElementById('count');
    let activeFilter = 'all';

    function t() { return i18n[lang]; }

    function badgeFor(type) {
      if (type === 'result') return `<span class="badge result">${t().badgeResult}</span>`;
      return `<span class="badge info">${t().badgeInfo}</span>`;
    }

    function render() {
      const items = bulletins.filter(b => {
        if (activeFilter === 'all') return true;
        if (activeFilter === 'new') return b.isNew;
        return b.type === activeFilter;
      });
      list.innerHTML = items.map(b => `
        <li class="bulletin" onclick="openModal(${bulletins.indexOf(b)})">
          ${badgeFor(b.type)}
          <div class="b-body">
            <h3>${b.pinned ? '<span class="pin">📌</span> ' : ''}${b.isNew ? '<span class="badge new">NEW</span> ' : ''}${lang === 'en' ? b.title_en : b.title}</h3>
            <div class="b-meta"><span>📅 ${b.date}</span><span>👁 ${b.views} ${t().views}</span></div>
          </div>
        </li>
      `).join('');
      countEl.textContent = t().countFn(items.length);
    }

    function applyLang() {
      document.documentElement.lang = lang === 'en' ? 'en' : 'zh-Hant';
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (t()[key] !== undefined) el.innerHTML = t()[key];
      });
      document.getElementById('langBtn').textContent = t().langBtn;
      render();
    }

    function toggleLang() {
      lang = lang === 'zh' ? 'en' : 'zh';
      applyLang();
    }

    document.getElementById('ctaBtn').addEventListener('click', e => {
      e.preventDefault();
      alert(t().ctaAlert);
    });

    document.getElementById('tabs').addEventListener('click', e => {
      if (!e.target.classList.contains('tab')) return;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      e.target.classList.add('active');
      activeFilter = e.target.dataset.filter;
      render();
    });

    function openModal(idx) {
      const b = bulletins[idx];
      document.getElementById('m-title').textContent = lang === 'en' ? b.title_en : b.title;
      document.getElementById('m-meta').innerHTML = `<span>📅 ${b.date}</span> &nbsp; <span>👁 ${b.views} ${t().views}</span>`;
      document.getElementById('m-body').innerHTML = `<p>${lang === 'en' ? b.body_en : b.body}</p>`;
      document.getElementById('modal').classList.add('open');
    }
    function closeModal() { document.getElementById('modal').classList.remove('open'); }
    document.getElementById('modal').addEventListener('click', e => {
      if (e.target.id === 'modal') closeModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    applyLang();
  </script>
</body>
</html>
